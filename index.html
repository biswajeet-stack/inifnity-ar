<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity One | AR Portal</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    
    <style>
        body { margin: 0; background-color: #050505; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        model-viewer { width: 100vw; height: 100vh; --poster-color: transparent; }
        
        .header { position: absolute; top: 30px; width: 100%; text-align: center; z-index: 10; pointer-events: none; }
        .header h1 { font-size: 1.5rem; letter-spacing: 4px; margin: 0; text-transform: uppercase; }
        
        .instruction {
            position: absolute;
            top: 70px;
            width: 100%;
            text-align: center;
            opacity: 0.6;
            font-size: 0.9rem;
        }

        .ar-button {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            padding: 18px 36px;
            background: linear-gradient(45deg, #007cf0, #00dfd8);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1rem;
            box-shadow: 0 4px 20px rgba(0, 124, 240, 0.4);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Infinity One</h1>
    </div>
    <div class="instruction">Scan your floor after tapping the button</div>

    <model-viewer 
        src="rocket.glb" 
        ios-src="rocket.usdc" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        ar-placement="floor"
        camera-controls 
        auto-rotate 
        shadow-intensity="1"
        environment-image="neutral">
        
        <button slot="ar-button" class="ar-button">
            VIEW IN YOUR SPACE
        </button>

    </model-viewer>

</body>
</html>
