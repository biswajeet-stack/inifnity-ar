<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity One - AR Demo</title>
    
    <!-- Using the open-source Google model-viewer library -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: radial-gradient(circle, #1a1a2e 0%, #0f0f1b 100%); font-family: sans-serif; overflow: hidden; }
        
        /* The AR Container */
        model-viewer {
            width: 100%;
            height: 100%;
            --poster-color: transparent;
        }

        /* Branding Overlay */
        .overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            pointer-events: none;
        }

        .overlay h1 { margin: 0; font-size: 24px; letter-spacing: 2px; }
        .overlay p { margin: 5px 0; opacity: 0.7; font-size: 14px; }

        /* The AR Activation Button */
        .ar-button {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            padding: 16px 32px;
            background: #ffffff;
            color: #000;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 18px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .ar-button:active { transform: translateX(-50%) scale(0.95); }
    </style>
</head>
<body>

    <div class="overlay">
        <h1>INFINITY ONE</h1>
        <p>AR Prototyping System v1.0</p>
    </div>

    <!-- 
      We are using a public NASA model for this demo.
      The 'ar-placement="floor"' attribute enables Option B.
    -->
    <model-viewer 
        src="https://modelviewer.dev/shared-assets/models/Astronaut.glb" 
        alt="A 3D space model for testing" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        ar-placement="floor"
        camera-controls 
        touch-action="pan-y"
        auto-rotate 
        shadow-intensity="2"
        exposure="1">
        
        <button slot="ar-button" class="ar-button">
            🚀 START AR TEST
        </button>

        <div slot="progress-bar"></div>
    </model-viewer>

</body>
</html>
